<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sb1delay - Redirecting...</title>
    <link rel="icon" type="image/png" href="/favicon.png">
</head>
<body style="font-family: sans-serif; text-align: center; padding-top: 100px; color: #666;">

    <img src="/favicon.png" alt="Logo" style="width: 60px; border-radius: 12px; margin-bottom: 20px;">
    <p>Connecting to Sb1delay analytics...</p>
    <div style="margin-top: 20px; color: #999; font-size: 14px;">Please wait, you are being redirected.</div>

    <script>
        window.onload = function() {
            var googleScriptUrl = "https://script.google.com/macros/s/AKfycby0iixqHXo78FVo3cgoRUjJUansMnMZQsHOlZ7yXWXcF9BV26oAeeSHn-zaKWPdaS0CQ/exec";
            var urlParams = window.location.search;
            
            // Если в ссылке есть код от TikTok, перенаправляем в Google Таблицу
            if (urlParams.includes('code=')) {
                window.location.href = googleScriptUrl + urlParams;
            } else {
                document.body.innerHTML = "<h2>Error: Authorization code not found.</h2><p><a href='/'>Return to Homepage</a></p>";
            }
        };
    </script>
</body>
</html>
